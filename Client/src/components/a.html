<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trình tạo kịch bản</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6"
  >
    <div
      class="w-full max-w-xl bg-gray-800 rounded-2xl shadow-xl p-6 space-y-6"
    >
      <h1 class="text-2xl font-bold text-center">🎬 Trình tạo kịch bản</h1>

      <!-- Hộp chat nhập nội dung -->
      <div>
        <label for="chatInput" class="block text-sm mb-1"
          >Nhập nội dung hội thoại:</label
        >
        <textarea
          id="chatInput"
          rows="5"
          class="w-full p-3 bg-gray-700 text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="Nhập lời thoại ở đây..."
        ></textarea>
      </div>

      <!-- Lựa chọn âm thanh -->
      <div>
        <label for="voiceSelect" class="block text-sm mb-1"
          >Chọn âm thanh:</label
        >
        <select
          id="voiceSelect"
          class="w-full p-3 bg-gray-700 text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          <option>Nam - Trầm</option>
          <option>Nữ - Trẻ trung</option>
          <option>Nam - Hài hước</option>
          <option>Nữ - Nghiêm túc</option>
        </select>
      </div>

      <!-- Lựa chọn loại kịch bản -->
      <div>
        <label for="scriptType" class="block text-sm mb-1"
          >Chọn loại kịch bản:</label
        >
        <select
          id="scriptType"
          class="w-full p-3 bg-gray-700 text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          <option>Phim ngắn</option>
          <option>Quảng cáo</option>
          <option>Hài kịch</option>
          <option>Câu chuyện cảm động</option>
        </select>
      </div>

      <!-- Nút gửi -->
      <div class="text-center">
        <button
          class="bg-indigo-600 hover:bg-indigo-700 px-6 py-3 rounded-xl font-semibold transition"
        >
          🎤 Tạo kịch bản
        </button>
      </div>
    </div>
  </body>
</html>
